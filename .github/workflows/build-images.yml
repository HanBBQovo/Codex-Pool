name: build-and-push-images

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-images.yml"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "services/**"
      - "frontend/**"
      - "docker/**"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - "docker-compose.team.yml"
      - "docker-compose.personal.yml"
      - "docker-compose.build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set rust image name
        run: echo "RUST_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}-rust" >> "$GITHUB_ENV"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rust image (attempt 1)
        id: rust_build_push_attempt_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/rust-runtime.Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=rust-runtime
          cache-to: type=gha,mode=max,scope=rust-runtime
          tags: |
            ${{ env.RUST_IMAGE }}:latest
            ${{ env.RUST_IMAGE }}:${{ github.sha }}

      - name: Re-login to GHCR (retry)
        if: steps.rust_build_push_attempt_1.outcome == 'failure'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rust image (attempt 2)
        if: steps.rust_build_push_attempt_1.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/rust-runtime.Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=rust-runtime
          cache-to: type=gha,mode=max,scope=rust-runtime
          tags: |
            ${{ env.RUST_IMAGE }}:latest
            ${{ env.RUST_IMAGE }}:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set frontend image name
        run: echo "FRONTEND_IMAGE=${REGISTRY}/${GITHUB_REPOSITORY,,}-frontend" >> "$GITHUB_ENV"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image (attempt 1)
        id: frontend_build_push_attempt_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.runtime.Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=frontend-runtime
          cache-to: type=gha,mode=max,scope=frontend-runtime
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Re-login to GHCR (retry)
        if: steps.frontend_build_push_attempt_1.outcome == 'failure'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image (attempt 2)
        if: steps.frontend_build_push_attempt_1.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.runtime.Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha,scope=frontend-runtime
          cache-to: type=gha,mode=max,scope=frontend-runtime
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
