name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust-check:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rust compile check
        run: cargo check --workspace --all-targets --locked

      - name: Business feature compile check
        run: cargo check -p control-plane --features clickhouse-backend --bin codex-pool-business --bin usage-worker --locked

  rust-fmt:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt (workspace)
        run: cargo fmt --all --check

  rust-test-fast:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rust fast tests (lib + bins)
        run: cargo test --workspace --lib --bins --locked

  rust-test-integration:
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      fail-fast: false
      matrix:
        package:
          - control-plane
          - data-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rust integration tests
        run: cargo test -p ${{ matrix.package }} --test integration --locked

  rust-clippy-full:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (workspace + all-targets)
        run: cargo clippy --workspace --all-targets --locked

  rust-audit:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Cargo audit
        run: cargo audit

  frontend:
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: i18n key parity
        run: npm run i18n:check

      - name: i18n hardcoded copy
        run: npm run i18n:hardcode -- --no-baseline

      - name: i18n runtime keys
        run: npm run i18n:runtime-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - rust-check
      - rust-fmt
      - rust-test-fast
      - rust-test-integration
      - rust-clippy-full
      - rust-audit
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rust runtime image
        run: docker build -f docker/rust-runtime.Dockerfile -t codex-pool-rust:ci .

      - name: Build frontend runtime image
        run: docker build -f docker/frontend.runtime.Dockerfile -t codex-pool-frontend:ci .
