name: codex-pool

services:
  postgres:
    image: postgres:18.2-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-codex_pool}
    volumes:
      - postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codex_pool}"]
      interval: 5s
      timeout: 3s
      retries: 20

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_NAME: ${POSTGRES_DB:-codex_pool}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      AUTH_TYPE: ${PGBOUNCER_AUTH_TYPE:-scram-sha-256}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-20}
      LISTEN_PORT: 6432
      ADMIN_USERS: ${POSTGRES_USER:-postgres}
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"

  redis:
    image: redis:7.4.8-alpine3.21
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "10000"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:26.1.3.52-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  control-plane:
    image: ${CONTROL_PLANE_IMAGE:-codex-pool-rust:local}
    command: ["control-plane"]
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_started
      clickhouse:
        condition: service_healthy
    environment:
      CODEX_POOL_EDITION: business
      CONTROL_PLANE_LISTEN: 0.0.0.0:8090
      CONTROL_PLANE_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-codex_pool}?statement-cache-capacity=0
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_ACCOUNT_TABLE: ${CLICKHOUSE_ACCOUNT_TABLE:-usage_account_hourly}
      CLICKHOUSE_TENANT_APIKEY_TABLE: ${CLICKHOUSE_TENANT_APIKEY_TABLE:-usage_tenant_api_key_hourly}
      CLICKHOUSE_TENANT_ACCOUNT_TABLE: ${CLICKHOUSE_TENANT_ACCOUNT_TABLE:-usage_tenant_account_hourly}
      CLICKHOUSE_REQUEST_LOG_TABLE: ${CLICKHOUSE_REQUEST_LOG_TABLE:-request_log_events}
      CONTROL_PLANE_INTERNAL_AUTH_TOKEN: ${CONTROL_PLANE_INTERNAL_AUTH_TOKEN:?CONTROL_PLANE_INTERNAL_AUTH_TOKEN is required}
      CONTROL_PLANE_API_KEY_HMAC_KEYS: ${CONTROL_PLANE_API_KEY_HMAC_KEYS:?CONTROL_PLANE_API_KEY_HMAC_KEYS is required}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?CREDENTIALS_ENCRYPTION_KEY is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      ADMIN_JWT_TTL_SEC: ${ADMIN_JWT_TTL_SEC:-28800}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${CONTROL_PLANE_PORT:-8090}:8090"

  data-plane:
    image: ${DATA_PLANE_IMAGE:-codex-pool-rust:local}
    command: ["data-plane"]
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      CODEX_POOL_EDITION: business
      DATA_PLANE_LISTEN: 0.0.0.0:8091
      CONTROL_PLANE_BASE_URL: http://control-plane:8090
      AUTH_VALIDATE_URL: http://control-plane:8090/internal/v1/auth/validate
      CONTROL_PLANE_INTERNAL_AUTH_TOKEN: ${CONTROL_PLANE_INTERNAL_AUTH_TOKEN:?CONTROL_PLANE_INTERNAL_AUTH_TOKEN is required}
      REDIS_URL: redis://redis:6379
      REQUEST_LOG_STREAM: ${REQUEST_LOG_STREAM:-stream.request_log}
      SNAPSHOT_POLL_INTERVAL_MS: ${SNAPSHOT_POLL_INTERVAL_MS:-1000}
      ROUTING_STRATEGY: ${ROUTING_STRATEGY:-round_robin}
      ENABLE_INTERNAL_DEBUG_ROUTES: ${ENABLE_INTERNAL_DEBUG_ROUTES:-false}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${DATA_PLANE_PORT:-8091}:8091"

  usage-worker:
    image: ${USAGE_WORKER_IMAGE:-codex-pool-rust:local}
    command: ["usage-worker"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CODEX_POOL_EDITION: business
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-default}
      CLICKHOUSE_ACCOUNT_TABLE: ${CLICKHOUSE_ACCOUNT_TABLE:-usage_account_hourly}
      CLICKHOUSE_TENANT_APIKEY_TABLE: ${CLICKHOUSE_TENANT_APIKEY_TABLE:-usage_tenant_api_key_hourly}
      CLICKHOUSE_TENANT_ACCOUNT_TABLE: ${CLICKHOUSE_TENANT_ACCOUNT_TABLE:-usage_tenant_account_hourly}
      REQUEST_LOG_STREAM: ${REQUEST_LOG_STREAM:-stream.request_log}
      REQUEST_LOG_CONSUMER_GROUP: ${REQUEST_LOG_CONSUMER_GROUP:-usage-worker}
      REQUEST_LOG_CONSUMER_NAME: ${REQUEST_LOG_CONSUMER_NAME:-usage-worker-1}
      USAGE_WORKER_MODE: ${USAGE_WORKER_MODE:-daemon}
      RUST_LOG: ${RUST_LOG:-info}

  frontend:
    image: ${FRONTEND_IMAGE:-codex-pool-frontend:local}
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres18-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
