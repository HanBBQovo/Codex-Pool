name: codex-pool-team

services:
  postgres:
    image: postgres:18.2-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-codex_pool}
    volumes:
      - postgres18-team-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-codex_pool}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ${CONTROL_PLANE_IMAGE:-codex-pool-rust:local}
    build:
      context: .
      dockerfile: docker/rust-runtime.Dockerfile
    command: ["control-plane"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODEX_POOL_EDITION: team
      CONTROL_PLANE_LISTEN: 0.0.0.0:8090
      CONTROL_PLANE_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-codex_pool}?statement-cache-capacity=0
      CONTROL_PLANE_INTERNAL_AUTH_TOKEN: ${CONTROL_PLANE_INTERNAL_AUTH_TOKEN:?CONTROL_PLANE_INTERNAL_AUTH_TOKEN is required}
      CONTROL_PLANE_API_KEY_HMAC_KEYS: ${CONTROL_PLANE_API_KEY_HMAC_KEYS:?CONTROL_PLANE_API_KEY_HMAC_KEYS is required}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:?CREDENTIALS_ENCRYPTION_KEY is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      ADMIN_JWT_TTL_SEC: ${ADMIN_JWT_TTL_SEC:-28800}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${TEAM_APP_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/livez >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres18-team-data:
